# Automated quality gates for merge requests and the default branch.
# Scheduled pipelines additionally run the heavier Lighthouse audit.

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'

stages:
  - validate
  - test
  - build
  - browser
  - performance

default:
  image: node:20-bookworm-slim
  interruptible: true
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
    policy: pull-push
  before_script:
    - npm ci --cache .npm --prefer-offline

lint:
  stage: validate
  script:
    - npm run lint

typecheck:
  stage: validate
  script:
    - npm run typecheck

unit-tests:
  stage: test
  script:
    - npm run test:coverage
  coverage: '/Statements\s*:\s*([0-9.]+)%/'
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - coverage/

production-build:
  stage: build
  script:
    - npm run build
    - npm run perf:budget
  artifacts:
    when: on_failure
    expire_in: 3 days
    paths:
      - .next/build-manifest.json
      - .next/routes-manifest.json

e2e:
  stage: browser
  image: mcr.microsoft.com/playwright:v1.51.1-noble
  variables:
    CI: "true"
  script:
    - npm run e2e:ci
  artifacts:
    when: always
    expire_in: 7 days
    reports:
      junit: test-results/e2e-junit.xml
    paths:
      - playwright-report/
      - test-results/

lighthouse:
  stage: performance
  image: mcr.microsoft.com/playwright:v1.51.1-noble
  variables:
    CI: "true"
  script:
    - npm run build
    - npm run perf:lighthouse
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - .lighthouseci/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
    - when: never
